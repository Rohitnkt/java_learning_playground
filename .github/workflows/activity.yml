name: Daily Commit

on:
  schedule:
    - cron: "0 18 * * *"
  workflow_dispatch:

jobs:
  commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Update activity
        run: echo "$(date)" >> activity.txt

      - name: Commit changes
        run: |
          git config --global user.name "Rohitnkt"
          git config --global user.email "panditrohitnaokothi@gmail.com"

          git add .
          git commit -m "daily activity update" || echo "No changes"

          git push
